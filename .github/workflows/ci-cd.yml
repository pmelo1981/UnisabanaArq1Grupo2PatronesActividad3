name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/productapi

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: |
        dotnet restore src/ProductAPI/ProductAPI.csproj
        dotnet restore src/ProductAPI.Tests/ProductAPI.Tests.csproj

    - name: Build
      run: |
        dotnet build src/ProductAPI/ProductAPI.csproj -c Release --no-restore
        dotnet build src/ProductAPI.Tests/ProductAPI.Tests.csproj -c Release --no-restore

    - name: Unit Tests
      run: dotnet test src/ProductAPI.Tests/ProductAPI.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Unit Test Results
        path: '**/test-results.trx'
        reporter: 'dotnet-trx'

    - name: Login to Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha

    - name: Build and push Docker image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: false
